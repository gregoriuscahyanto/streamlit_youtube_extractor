# Continue Configuration für GWDG Chat-AI (devstral 2)
# Dokumentation: https://docs.continue.dev/reference
name: GWDG Chat-AI Config
version: 1.2.0
schema: v1

# Continue Configuration für GWDG Chat-AI
models:
  - title: "GWDG Devstral 2"
    provider: "openai"
    model: "devstral-2"
    apiKey: "4c771273b1a4263a98043456773b8907"
    apiBase: "https://chat-ai.academiccloud.de/v1"
    contextLength: 4096
    completionOptions:
      temperature: 0.7
      maxTokens: 2000
      topP: 1.0

# Dies aktiviert die automatische Code-Vervollständigung während des Tippens
tabAutocompleteModel:
  title: "GWDG Autocomplete"
  provider: "openai"
  model: "devstral-2"
  apiKey: "4c771273b1a4263a98043456773b8907"
  apiBase: "https://chat-ai.academiccloud.de/v1"

# Standard-Befehle im Chat (erreichbar über /)
slashCommands:
  - name: "edit"
    description: "Code bearbeiten"
  - name: "comment"
    description: "Kommentare schreiben"
  - name: "explain"
    description: "Code erklären"

# Einstellungen
allowAnonymousTelemetry: false