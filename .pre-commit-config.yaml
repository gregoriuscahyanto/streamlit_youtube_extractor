repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
  - repo: local
    hooks:
      - id: harness-lint
        name: harness lint
        entry: python scripts/harness_lint.py
        language: system
        pass_filenames: false
